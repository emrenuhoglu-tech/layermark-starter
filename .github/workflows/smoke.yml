name: Smoke test

on:
  push:
    branches: [main, master]
    paths:
      - 'setup_starter.py'
      - 'template/**'
      - 'tests/**'
      - '.github/workflows/smoke.yml'
  pull_request:
    paths:
      - 'setup_starter.py'
      - 'template/**'
      - 'tests/**'
      - '.github/workflows/smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run smoke test (3 scenarios — assistant/blank/finance)
        run: python tests/smoke_test.py
