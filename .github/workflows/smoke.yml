name: Smoke test

on:
  push:
    branches: [main, master]
    paths:
      - 'setup_starter.py'
      - 'template/**'
      - 'tests/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/smoke.yml'
  pull_request:
    paths:
      - 'setup_starter.py'
      - 'template/**'
      - 'tests/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/smoke.yml'
  workflow_dispatch:

jobs:
  setup-starter:
    name: setup_starter.py smoke (5 scenarios)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run setup_starter smoke
        run: python tests/smoke_test.py

  site-build:
    name: site build smoke (next build — catches template literal bugs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm ci || npm install
      - name: Build
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /layermark-starter
        run: npm run build
